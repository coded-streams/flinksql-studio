# ══════════════════════════════════════════════════════════════════════════════
# Str:::lab Studio — docker-compose.yml
#
# The gateway is managed by a separate compose project (flink-cluster).
# Its udf-jars volume is named: flink-cluster_udf-jars
# We reference it here as external so both containers share the same volume.
# ══════════════════════════════════════════════════════════════════════════════

services:

  flink-studio:
    image: codedstreams/strlabstudio:latest
    container_name: strlab-studio
    restart: unless-stopped
    ports:
      - "3030:80"
    environment:
      FLINK_GATEWAY_HOST: flink-sql-gateway
      FLINK_GATEWAY_PORT: "8083"
      JOBMANAGER_HOST:    codedstream-jobmanager
      JOBMANAGER_PORT:    "8081"
    volumes:
      - udf-jars:/var/www/udf-jars   # same volume as flink-sql-gateway
    networks:
      - kafka-network-02

volumes:
  udf-jars:
    external: true
    name: flink-cluster_udf-jars     # exact volume name from: docker volume ls

networks:
  kafka-network-02:
    external: true