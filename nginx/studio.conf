# ══════════════════════════════════════════════════════════════════════════════
# nginx/studio.conf — Str:::lab Studio
# Complete configuration with UDF JAR serving via WebDAV PUT
# ══════════════════════════════════════════════════════════════════════════════

# Global upload size limit — must be at http {} level (outside server {})
# This overrides nginx's default 1m limit for JAR file uploads.
client_max_body_size 512m;

server {
    listen       80;
    server_name  _;

    # ── Static IDE files ────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check endpoint ───────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # UDF JAR SERVING — nginx WebDAV (zero extra dependencies)
    #
    # How it works:
    #   1. Browser PUT /udf-jars/my-udf.jar  → nginx saves to /var/www/udf-jars/
    #   2. nginx serves GET /udf-jars/my-udf.jar
    #   3. Studio runs: ADD JAR 'http://studio-host/udf-jars/my-udf.jar'
    #   4. Flink SQL Gateway fetches the JAR from nginx over HTTP
    #   5. Gateway loads it into session classloader → CREATE FUNCTION works
    #
    # nginx:1.25-alpine includes ngx_http_dav_module compiled by default.
    # No extra packages. No Python. No extra services.
    # ══════════════════════════════════════════════════════════════════════════
    location /udf-jars/ {
        alias  /var/www/udf-jars/;

        # WebDAV: allow browser to PUT (upload) and DELETE files
        dav_methods     PUT DELETE;
        dav_access      user:rw group:r all:r;
        create_full_put_path  on;

        # CORS — required so the browser can PUT from the Studio page
        add_header  Access-Control-Allow-Origin  *  always;
        add_header  Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
        add_header  Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Directory listing in JSON so the IDE can list uploaded JARs
        autoindex            on;
        autoindex_format     json;
        autoindex_localtime  off;

        # Per-location upload size (belt and suspenders)
        client_max_body_size 512m;

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink SQL Gateway proxy ─────────────────────────────────────────────
    location /flink-api/ {
        rewrite ^/flink-api/(.*) /$1 break;

        proxy_pass         http://${FLINK_GATEWAY_HOST}:${FLINK_GATEWAY_PORT};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_connect_timeout 30s;

        proxy_buffering    off;
        proxy_cache        off;

        add_header  Access-Control-Allow-Origin  *  always;
        add_header  Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header  Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink JobManager REST proxy ─────────────────────────────────────────
    location /jobmanager-api/ {
        rewrite ^/jobmanager-api/(.*) /$1 break;

        proxy_pass         http://${JOBMANAGER_HOST}:${JOBMANAGER_PORT};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Large timeout for JAR uploads to JobManager
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_connect_timeout 30s;

        # Must allow large request bodies for JAR uploads
        client_max_body_size 512m;
    }
}