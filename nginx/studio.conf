# ══════════════════════════════════════════════════════════════════════════════
# nginx/studio.conf — Str:::lab Studio v1.2.4
# Compatible with: Docker Compose · Kubernetes · Local
# ══════════════════════════════════════════════════════════════════════════════

client_max_body_size 512m;

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── DNS resolver ────────────────────────────────────────────────────────
    # Populated from /etc/resolv.conf at startup by docker-entrypoint.sh.
    # Using variable upstreams requires an explicit resolver so nginx can
    # re-resolve container names at request time (not startup time).
    resolver ${RESOLVER} valid=30s ipv6=off;

    # ── Static IDE files ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check ────────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── UDF JAR storage (nginx WebDAV PUT) ──────────────────────────────────
    # Browser PUT /udf-jars/x.jar → nginx saves to /var/www/udf-jars/
    # Gateway fetches via ADD JAR 'http://studio-host/udf-jars/x.jar'
    #
    # Uses 'root' (not 'alias') — required for dav_methods to work correctly
    # on nginx:alpine. The location /udf-jars/ maps to /var/www/udf-jars/.
    # Directory is created and chown'd to nginx user in docker-entrypoint.sh.
    location /udf-jars/ {
        root /var/www;

        dav_methods          PUT DELETE;
        dav_access           user:rw group:rw all:r;
        create_full_put_path on;

        add_header  Access-Control-Allow-Origin  *  always;
        add_header  Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
        add_header  Access-Control-Allow-Headers "Content-Type, Authorization" always;

        autoindex           on;
        autoindex_format    json;
        autoindex_localtime off;

        client_max_body_size 512m;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink SQL Gateway proxy ─────────────────────────────────────────────
    # Variable upstream defers DNS resolution to request time.
    # "Via Studio" connection mode routes through here.
    # Requires Studio container to be on the same Docker network as the Gateway.
    location /flink-api/ {
        rewrite ^/flink-api/(.*) /$1 break;

        set $flink_gateway ${FLINK_GATEWAY_HOST}:${FLINK_GATEWAY_PORT};
        proxy_pass         http://$flink_gateway;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;

        proxy_buffering off;
        proxy_cache     off;

        add_header  Access-Control-Allow-Origin  *  always;
        add_header  Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header  Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink JobManager REST proxy ─────────────────────────────────────────
    location /jobmanager-api/ {
        rewrite ^/jobmanager-api/(.*) /$1 break;

        set $flink_jobmanager ${JOBMANAGER_HOST}:${JOBMANAGER_PORT};
        proxy_pass         http://$flink_jobmanager;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  10s;

        client_max_body_size 512m;
    }
}