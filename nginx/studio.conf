# ══════════════════════════════════════════════════════════════════════════════
# nginx/studio.conf — Str:::lab Studio
#
# Compatible with: Docker Compose · Kubernetes · Local (direct URL)
#
# ${RESOLVER} is injected at runtime by docker-entrypoint.sh from
# /etc/resolv.conf — works in Docker (127.0.0.11), Kubernetes (kube-dns IP),
# and local environments without any environment-specific changes.
# ══════════════════════════════════════════════════════════════════════════════

client_max_body_size 512m;

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── DNS resolver ────────────────────────────────────────────────────────
    # Injected from /etc/resolv.conf at container startup.
    # Defers hostname resolution to request time (not startup time), which
    # prevents "host not found" when upstream services start after nginx.
    # valid=30s: re-resolve every 30s so container restarts are picked up.
    resolver ${RESOLVER} valid=30s ipv6=off;

    # ── Static IDE files ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check ────────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── UDF JAR storage (nginx WebDAV PUT) ──────────────────────────────────
    # Engineers upload JARs here from the IDE. nginx stores them and serves
    # them at an HTTP URL. The Flink SQL Gateway fetches them via ADD JAR.
    # No filesystem sharing between containers required.
    location /udf-jars/ {
        alias  /var/www/udf-jars/;

        dav_methods          PUT DELETE;
        dav_access           user:rw group:r all:r;
        create_full_put_path on;

        add_header  Access-Control-Allow-Origin  *  always;
        add_header  Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
        add_header  Access-Control-Allow-Headers "Content-Type, Authorization" always;

        autoindex           on;
        autoindex_format    json;
        autoindex_localtime off;

        client_max_body_size 512m;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink SQL Gateway proxy ─────────────────────────────────────────────
    # proxy_pass uses a variable so nginx resolves the hostname at request
    # time (via the resolver above), not at startup. Required when the
    # gateway container/pod may not be ready when nginx starts.
    location /flink-api/ {
        rewrite ^/flink-api/(.*) /$1 break;

        set $flink_gateway ${FLINK_GATEWAY_HOST}:${FLINK_GATEWAY_PORT};
        proxy_pass         http://$flink_gateway;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  30s;

        proxy_buffering off;
        proxy_cache     off;

        add_header  Access-Control-Allow-Origin  *  always;
        add_header  Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header  Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Flink JobManager REST proxy ─────────────────────────────────────────
    location /jobmanager-api/ {
        rewrite ^/jobmanager-api/(.*) /$1 break;

        set $flink_jobmanager ${JOBMANAGER_HOST}:${JOBMANAGER_PORT};
        proxy_pass         http://$flink_jobmanager;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout  30s;

        client_max_body_size 512m;
    }
}